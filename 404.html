<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E1628">
<title>Page Not Found — Wexborne Consulting</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preload" href="sans-main/fonts/webfonts/CalSans-Regular.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:"Cal Sans";src:url("sans-main/fonts/webfonts/CalSans-Regular.woff2") format("woff2");font-display:swap}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 70% 25%,rgba(201,169,110,.18),transparent 25%),linear-gradient(135deg,#0a1020,#141f38);color:#fff;font-family:"Cal Sans",sans-serif}
main{width:min(680px,100%);text-align:center}
img{width:min(360px,70vw);height:auto;margin-bottom:44px}
.code{color:#c9a96e;font-size:13px;letter-spacing:.3em;text-transform:uppercase}
h1{margin:18px 0 14px;font-size:clamp(42px,8vw,76px);font-weight:400;line-height:1;text-transform:uppercase}
p{margin:0 auto 30px;max-width:520px;color:rgba(255,255,255,.62);font-size:17px;line-height:1.6}
a{display:inline-flex;padding:14px 24px;border:1px solid rgba(201,169,110,.7);border-radius:3px;background:rgba(201,169,110,.13);color:#fff;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;transition:transform 140ms cubic-bezier(.23,1,.32,1),background-color 180ms cubic-bezier(.23,1,.32,1)}
a:hover{background:rgba(201,169,110,.24)}
a:active{transform:scale(.97)}
a:focus-visible{outline:2px solid #c9a96e;outline-offset:4px}
</style>
</head>
<body>
<main>
  <img src="wexborne-logo-transparent.png" alt="Wexborne Consulting" width="817" height="202">
  <div class="code">Error 404</div>
  <h1>Page not found</h1>
  <p>The page you requested may have moved or no longer exists. Return to the Wexborne Consulting homepage to continue.</p>
  <a href="/">Return home</a>
</main>
</body>
</html>
